#                                                       #   No default. If omitted, no domain substitution is done.
#                                                       #
#   disable_encrypted_timestamp = true|*false* ( false )#   Enable/disable the encrypted timestamp pre-auth method. That is the default Kerberos pre-auth method: 
#                                                       #       1.  KDC sends PREAUTH-REQUIRED
#                                                       #       2.  Client encrypts current timestamp with its long-term key, which is password-derived
#                                                       #       3.  KDC decrypts it to verify key ownership and freshness.
#                                                       #   In the RFCs it is called PA-ENC-TIMESTAMP.
#                                                       #   The man page makes this sound as a good idea cuz it might deter an _active_ attacker. Here is a better answer from
#                                                       #   superuser.com:
#                                                       #       https://superuser.com/questions/200010/how-does-kerberos-preauthentication-increase-security
#                                                       #   When you do not enforce pre-authentication, the attacker can directly send a dummy request for authentication. The
#                                                       #   KDC will return an encrypted TGT and the attacker can brute force it offline. You will see nothing in your KDC logs
#                                                       #   except a single request for a TGT.
#                                                       #   When you enforce timestamp pre-authentication, the attacker cannot directly ask the KDCs for the encrypted material
#                                                       #   to brute force offline. The attacker has to encrypt a timestamp with a password and offer it to the KDC. Yes, he can
#                                                       #   do this over and over but you will see a KDC log entry every time he fails preauth.
#                                                       #       (Edited for commas and apostrophe)
#                                                       #   So the man page makes it sound like it is a good idea to turn this one, but seriously keep this off and at least have
#                                                       #   a log of when the attack happened. The same URL from superuser.com mentions:
#                                                       #       Mitigations to this problem include using long passwords and a good password rotation policy to make the offline
#                                                       #       brute-forcing infeasible or using PKINIT (http://www.ietf.org/rfc/rfc4556.txt)
#                                                       #   Commenter on the same answer mentions this Microsofot TechNet article:
#                                                       #       Kerberos Pre-Authentication: Why It Should Not Be Disabled
#                                                       #       https://learn.microsoft.com/en-us/archive/technet-wiki/23559.kerberos-pre-authentication-why-it-should-not-be-disabled
#                                                       #       https://archive.ph/wip/THW9p
#                                                       #   The basic premise of the article is the same as the answer: When Pre-Auth is turned off, an attacker can capture a TGT
#                                                       #   and take it offline (where in these days, with a Threadripper Pro it will be toast in a week, tops.)
