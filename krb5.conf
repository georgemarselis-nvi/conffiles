#                                                       #   socket. 
#                                                       #   Very high-overview of how MacOS Kerberos Framework works, do not take it at face value:
#                                                       #   macOS uses a custom Kerberos framework, based on Heimdal, not MIT Kerberos. It integrates tightly with the security
#                                                       #   architecture of Apple. macOS uses Mach ports (kernel-level message queues) for inter-process communication. launchd manages
#                                                       #   these ports, allowing system components (like KCM) to store credentials centrally in memory. It does not use files, but uses
#                                                       #   multi-process access and sandboxed apps for centralized ticket management and it does not write tickets to disk.
#                                                       #   Furthermore: Kerberos Credential Manager (KMC) is a daemon managing credentials (TGTs, tickets) for the uses, whichh are 
#                                                       #   stored centrally via launchd IPC (Mach ports), not files, as we already said.
#                                                       #   If you are not running MacOS, you should not care about this.
