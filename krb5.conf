##########################################################################
# /etc/krb5.conf
#   Kerberos configuration file
#   Aspiring to be written in the the PostgreSQL documentation style: clear and consise
#
#   2025-05-19  George Marselis <george@marsel.is>
##########################################################################
#
##########################################################################
# STRUCTURE
#   The krb5.conf file is set up in the Microsoft Windows .ini format, same as the krb5.conf(5)
#
##########################################################################
# SECTIONS
#   A krb5.conf file may contain the following sections:
#       [libdefaults]
#       [realms]
#       [domain_realm]
#       [capaths]
#       [appdefaults]
#       [plugins]
#
#   Additionally, krb5.conf may include any of the relations described in kdc.conf, which
#   is both totally insane and lazy to do.
#
##########################################################################
# VARIABLES FOR EACH SECTION AND THEIR VALUES
##########################################################################
#
#
#   NOTE:  In krb5.conf, later declarations override earlier ones unless the
#   section is marked with a '*' after the closing bracket. That is called a
#   final section. In the case of a final section, later declerations are
#   ignored (without any warning).
#
#   You can also do the same thing with both the sections mentioned above, e.g.
#   '[libdefaults]*' and with any subsections such as the commented out here
#   EXAMPLE.COM realm.
#
#   In Fedora 41, to opt out of the system crypto-policies configuration of
#   krb5, remove the symlink at /etc/krb5.conf.d/crypto-policies . This link
#   will not be recreated.
#
#   krb5.conf can include other files using either `include FILENAME` or `includedir DIRNAME`
#   Either FILENAME or DIRNAME has to be an absolute path. If you add a directory, all files
#   within that directory endinf in *.conf will be included, with the single exception of
#   '.conf' itself.
includedir /etc/krb5.conf.d/
#
##########################################################################
# MODULE (AND THE INSANITY THEREOF)
##########################################################################
#
#   Last, but not least (and definitely fucking insane): you can pass arbitrary strings
#   to your own library using `module`. Those arbritrary strings are called 'residuals' in
#   Kerberos lingo. Residuals let you hand arbitrary strings (e.g. file paths or JSON
#   blobs) to your own plugin. They are declared as following:
#
#       module MODULE_PATH:RESIDUAL
#
#   For example:
#   
#       module /usr/lib64/krb5/plugins/libprofile_json.so:/etc/krb5-config.json
#
#   libprofile_json.so is not a real library. But the `residual` string would
#   will be passed to the `profile_module_initialize()` function of the module as
#
#       profile_module_initialize(const char *residual, ...) {
#           // residual == "/etc/krb5-config.json"
#       }
#
#   This is used in 'exotic' setups, where we are the fuck off our rocker and we want to use
#   json to parse the config. 
#
#   But then the whole setup here is fucking out of this world. This configuration and parser
#   is fucked up way beyond recognition or saving as software. The fact that the configuration
#   is saying 
#
#       if krb5.conf uses a module directive, kdc.conf(5) should also use one if it exists
#
#   is just incomprehensible. To me, it looks like someone half-assed the transition of
#   .ini style config into json and run out of funding at the first ten minutes.
#   In-fucking-credible.
#
##########################################################################
#
#   A sensible setup example is included at the end of the commentary, after FURTHER DISCUSSION
#
#[libdefaults]          # Settings used by the Kerberos library for *CLIENTS*
#
#   allow_weak_crypto           = false (false)         #   Jesus frakking Christ. OK, in kdc.conf, I have a section noted as "MASTER KEY ALGORITHMS". Those
#                                                       #   are algorithms accepted for the `master_key_type` variable. Some are stronger than others and 
#                                                       #   some are way past their prime. This boolean affects the *client* side and allows the *client*
#                                                       #   to use weak crypto, if enabled. Using a single variable for both client and server was too much
#                                                       #   work, apparently.
#                                                       #   Defaults to false.
#                                                       #
#   canonicalize                = true (false)          #   Enables realm aliasing and referral-based logins.
#                                                       #   What does this mean?
#                                                       #       It tells the Kerberos client to accept redirects from the KDC and turn login names like
#                                                       #       user@domain.com into the real Kerberos identity, like user@REALM and vice versa. The Kerberos
#                                                       #       client follows KDC referral tickets (RFC 6806) and resolves enterprise principals to the
#                                                       #       canonical form (user@REALM -> user@example.com)
#                                                       #   Why does this exist?
#                                                       #       In a traditional Kerberos realm, the username you type (user@REALM) must exactly match a realm
#                                                       #       defined in krb5.confi and said realm must have its KDC and admin servers explicitly listed. If
#                                                       #       the realm is not configured, or the authenticating realm name is different (like user@domain.com,
#                                                       #       as is in Active Directory), authentication fails: no guessing what the correct realm is, no
#                                                       #       redirection to the nearest AD/KDC to see there if the username can be resolved and definatelly no
#                                                       #       aliasing of any realm is accepted. Canonicalization fixes that by allowing the KDC to redirect, as
#                                                       #       per RFC 6806. Yes, this is a Microsoft backward-compatible graft for Microsoft-style enterprise
#                                                       #       principals and referral TGTs, also known as MS-KILE. 
#                                                       #   What is MS-KILE? 
#                                                       #       MS-KILE stands for "Microsoft Kerberos Internet Login Extensions". It is a Microsoft custom extension
#                                                       #       of the Kerberos protocol for Active Directory, aimed at adding features like:
#                                                       #       *   Enterprise principals (user@domain.com)
#                                                       #       *   Referrals (RFC 6806)
#                                                       #       *   PACs (Privilege Attribute Certificates)
#                                                       #       *   S4U (Service-for-User) [Refer to the kdc.conf explaination of what is S4U]
#                                                       #       *   Smartcard authentication
#                                                       #   This little underspecified and underdocumented flag took me a day and a half to decrypt and it is one
#                                                       #   of the modifications Windows AD made to the Kerberos protocol to adapt it to its ecosystem.
#                                                       #       RFC 6806: https://datatracker.ietf.org/doc/html/rfc6806 ( 19 pages )
#                                                       #   What else does this flag imply?
#                                                       #       *   Cross-realm referrals (krbtgt/REALM@CHILD.REALM)
#                                                       #       *   Microsoft AD domains or aliases that map to a real realm
#                                                       #   What are "Enterprise-style login names"?
#                                                       #       "Enterprise-style login names" are usernames in email format, like alice@example.com . These do not
#                                                       #       always match a Kerberos realm exactly, so the KDC issues a referral to the real realm (e.g., EXAMPLE.COM).
#                                                       #       This started with Microsoft’s MS-KILE in Active Directory and was codified in RFC 6806. This started
#                                                       #       around mid-2000s as AD grew and interoperability demanded it. MIT and Heimdal adopted support later,
#                                                       #       for compatiblity.
#                                                       #   Defaults to false. Set to true if your environment has
#                                                       #       *   Interoperability with Active Directory
#                                                       #       *   Multiple realms
#                                                       #       *   Login domains like user@company.com that don't match any [realms] section in krb5.conf. Example:
#                                                       #               You define REALM.COMPANY in kdc.conf. User logs in as user@company.com . Without canonicalization,
#                                                       #               this fails. With canonicalization, client receives a referal TGT and follows referral to REALM.COMPANY
#                                                       #
#   ccache_type                 = 4 (4)                 #   Set the credential cache format. Oh, boy. This is a doozy that will make your blood boil:
#                                                       #       *   1   ->  FILE: plain file at KRB5CCNAME=/tmp/krb5cc_*
#                                                       #       *   2   ->  MEMORY: in-RAM storage of credentials, no file.
#                                                       #       *   3   ->  API: macOS/Heimdal only
#                                                       #       *   4   ->  DIR (default): directory cache, supports multiple credentials per realm/service
#                                                       #   Number maps to internal constants in libkrb5. It selects the default backend for ccache ops. Use 2 for security
#                                                       #   (no disk), 1 for compatibility, 4 for SSSD/auto-renew setups. The catch? This is nowhere documented. Nowhere but
#                                                       #   the code. The man page mentions that this value is an integer but it does not mention range or what are the other
#                                                       #   formats. This is pure sysadmin abuse. I cannot even...  You will find this inside `src/lib/krb5/ccache/ccdef.c`,
#                                                       #   in the distribution. That is the only location.
#                                                       #   But, wait, there is even more to raise your blood pressure: 
#                                                       #       If you ccache_type to 1, you set the file location either via `default_ccache_name` bellow or by via the env
#                                                       #       `KRB5CCNAME=FILE:/tmp/my_custom_ccache` . The default location is `/tmp/krb5cc_%{UID}` (see bellow for GENERAL
#                                                       #       DISCUSSION: PARAMETER EXPANSION) 
#                                                       #       If you set ccache_type to 2, you got the following options via KRB5CCNAME:
#                                                       #           *   MEMORY:default → named, in-memory cache
#                                                       #           *   MEMORY:foobar  → user-defined shared name ( in this case, foobar )
#                                                       #           *   MEMORY:(empty) → anonymous, private to the process
#                                                       #           All three is basically the same mechanism: libkrb5 malloc()s memory, with the only restriction that memory has
#                                                       #           to exist under the same uid as the process that started it. In essence, it is a shared memory ONLY IN THE uid
#                                                       #           SPACE THAT STARTED IT, not across the whole machine. No IPC is happening here. The only reason this exists is
#                                                       #           to allow applications to have seperate credential caches. With no tag, you get an unamed memory region. With
#                                                       #           your own custom tag or `default`, you get access to that particular ccache, via the static global hashtable of
#                                                       #           ccaches which is indexed by tag ("foobar", "default", etc). 
#                                                       #       If you set ccache_type to 3, there is even more fun, as it does nothing in the MIT Kerberos implementation. It exists
#                                                       #       for compatiblity with the Apple fork of the Heimdal Kerberos which has an API framework via a daemon for its ccache
#                                                       #       support, meaning, in MacOS, credentials are behind a daemon and your app communicates with the daemon via some mechanism
#                                                       #       to get to them, vs the FILE:, MEMORY: and DIR: mechanisms of sharing credential caches.
#                                                       #       If you set ccache_type to 4, you select a directory where all the credentials of all users are saved, as files. The
#                                                       #       location and behaviour depends on parameter expansion (see GENERAL DISCUSSION: PARAMETER EXPANSION bellow ). It is
#                                                       #       like 1, but allows credentials from multiple users to be saved in a single location. The DIRR: backend is the only
#                                                       #       backend which supports automatic renewal and multiple processes or services for the same user. That is why it is the
#                                                       #       default in SSSD setups. It is the only backend which can access the same credential cache, because it is s stored on
#                                                       #       disk and indexed by UID or a shared filename. Besides SSSD, it is useful in GSSAPI-enabled services (e.g., SSH, NFS,
#                                                       #       LDAP) and desktop logins + terminal sessions sharing one TGT. You set the location is via setting the `default_ccache_name`
#                                                       #       config variable below or by the env `KRB5CCNAME` to something like `DIR:/path/to/dir`. DIR: defaults to DIR:/tmp/krb5cc_%{uid}
#                                                       #       This is defined in `src/lib/krb5/ccache/cc_dir.c`
#
#   clockskew                   = 300 ( 300 )           #   Set the maximum alloweable of clockskew in seconds that the library will tolerate before assuming that a Kerberos message
#                                                       #   is invalid. The default value is 300 seconds, or five minutes. The clockskew setting is also used when evaluating ticket
#                                                       #   start and expiration times. For example, tickets that have reached their expiration time can still be used (and renewed
#                                                       #   if they are renewable tickets) if they have been expired for a shorter duration than the clockskew setting.
#                                                       #   Defaults to 300 seconds - 5 minutes. Set identically on all clients and KDCs to avoid mismatches.
#                                                       #
#   default_ccache_name         = FILE:/tmp/krb5cc_%{uid} ( FILE:/tmp/krb5cc_%{uid} )
#                                                       #   Specify the default credential cache filename. See below at GENERAL DISCUSSION: PARAMETER EXPANSION for how %{uid} expands.
#                                                       #   Defaults to `FILE:/tmp/krb5cc_%{uid}`
#                                                       #
#   default_client_keytab_name  = FILE:/var/kerberos/krb5/user/%{euid}/client.keytab ( FILE:/var/kerberos/krb5/user/%{euid}/client.keytab )
#                                                       #   Specify the default keytab for *client tools* to obtain *client* credentials, such as `/usr/bin/kinit`. This and 
#                                                       #   `default_keytab_name` below can be confusing, so, we are discussing them below in GENERAL DISCUSSION: CCACHE AND
#                                                       #   KEYTABS.
#                                                       #   Defaults to `FILE:/var/kerberos/krb5/user/%{euid}/client.keytab`
#                                                       #
#   default_keytab_name         = FILE:/etc/krb5.keytab ( FILE:/etc/krb5.keytab )
#                                                       #   Specify the default keytab for *services* to obtain *service* credentials, such as `/usr/sbin/sshd`. This and
#                                                       #   `default_client_keytab_name` above can be confusing, so, we are discussing them below in GENERAL DISCUSSION:
#                                                       #   CCACHE AND KEYTABS.
#                                                       #   Defaults to `FILE:/etc/krb5.keytab`
#                                                       #
#   default_rcache_name         = dfl:/tmp ( dfl: )     #   Set the backend used for a replay cache. A replay cache stores authenticators to prevent replay attacks (i.e. reusing
#                                                       #   the same Kerberos request). Each authenticator should only be used once and the cache helps detect replays within a
#                                                       #   short time window. Valid values are `dlf:`, `file2:/custom/path` and `none`. `none` disables replay protection. You only
#                                                       #   set the directory here: the default name of the cache is `krb5.rcache2` and that is hardcoded into `src/lib/krb5/rcache/rc_dfl.c`.
#                                                       #   During startup, it checks at least the user ownership of the file. Mind you, clients and the kdc have their own individual
#                                                       #   replay caches. In MIT Kerberos, the replay cache (rcache) uses the clockskew parameter to determine the validity window for
#                                                       #   authenticators. An authenticator is a per-request, timestamped proof that a client just used its TGT or service ticket. It
#                                                       #   includes:
#                                                       #       *   Current timestamp
#                                                       #       *   Client principal
#                                                       #       *   Session key
#                                                       #       *   Optional subkey or checksum
#                                                       #   It is encrypted with the session key from the ticket. Used in the AP-REQ to prevent replays and there can only be one
#                                                       #   authenticator per service ticket per 5-minute/clockskew window.
#                                                       #   Defaults to `dfl:`, which means that there is a replay file under /var/tmp (or modern equivalent) . This option is subject to parameter
#                                                       #   expansion (See below under GENERAL DISCUSSION: PARAMETER EXPANSION).
#                                                       #   Read more at: https://web.mit.edu/kerberos/krb5-latest/doc/basic/rcache_def.html
#                                                       #
#   default_realm               = NULL ( NULL )         #   Specify the default realm for *the client* . Set when none or more than one are specified. It is used when the realm is
#                                                       #   omitted in the principal ( user vs user@REALM). If unset, tools may fail or guess based on hostname. Usually set in
#                                                       #   [libdefaults] to avoid ambiguity. If not set, then you got to specify a realm with every kerberos principal you use
#                                                       #   a user-land tool with. Remember: hostname-derived realms are typically uppercased, as returned from `krb5_get_host_realm()`
#                                                       #   Default to `NULL` .
#                                                       #
#   default_tgs_enctypes        = A FUCKING MESS        #   DEPRECATED. DO NOT SET, UNLESS YOU ARE IN A LEGACY INSTALLATION
