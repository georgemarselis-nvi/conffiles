#                                                       #   
#                                                       #   RULE:[n:$1;$2;...;$9](regex)s/<pattern>/<replacement>/g
#                                                       #       The local name will be derived from the replace operation.
#                                                       #
#                                                       #   My blood pressure is about to go through the roof. Bloody Stupid Johnson designed Kerberos: a patchwork of 1980s design
#                                                       #   duct-taped onto modern systems—with knobs labeled in Sanskrit. This variable is designed for environments without consistent
#                                                       #   usernames or centralized identity (pre-LDAP, pre-SSSD). It still fucking persists as legacy crutch to paper over mismatched
#                                                       #   naming schemes.
#                                                       #
#                                                       #       > RULE:[n:$1;$2;...;$9](regex)s/<pattern>/<replacement>/g
#                                                       #   Let us explain this one step at a time. RULE is a token. It has to be there to signify that this is a processing rule and not
#                                                       #   DEFAULT (more on that later). n is a priority rule: the smaller the the number the higher the priority a rule gets executed. So, if you
#                                                       #   want to map multiple principals to the same username, be careful with the ordering. 
#                                                       #   <pattern> and <replacement> are EBNF POSIX regular expressions (and replacement), which according to the POSIX standard can have up
#                                                       #   to nine placeholderds, though do not ask what the heck you going to do with nine placeholders in a principal that mostly
#                                                       #   mostly looks like
#                                                       #       host/server1.domain.com@REALM
#                                                       #   Keep it simple, all you want is to map a username. DEFAULT maps the principal name as the local user name. If the principal has
#                                                       #   more than one component, DEFAULT will fail and you get an authentication failture.
#                                                       #   It is also important to note the inside the regex you get only the principal without the realm.
#                                                       #   Though to be honest, you should trash this bullshit all together and never use this configuration variable. Use LDAP or AD, people.
#                                                       #   There is no implicit DEFAULT; you must declare it explicitly if desired.
#                                                       #   ALSO NOTE: THE MAN PAGE MENTIONS SEMICOLONS. IGNORE THE MAN PAGE. THERE ARE NO PRINCIPALS WITH SEMICROLONS, SO THEY GAVE A
#                                                       #   BULLSHIT EXAMPLE. TOTAL GARBAGE EXAMPLE: Kerberos canonical principals never contain ;, only / and @.
#                                                       #   
#                                                       #   This configuration variable is too much angst about nothing. if replaced with a central directory, it is useless. Good
#                                                       #   example of bad design
#                                                       #   No predetermined default.
