# /etc/krb5.conf
#   Kerberos configuration file
#   Aspiring to be written in the the PostgreSQL documentation style: clear and consise
#
#   2025-05-19  George Marselis <george@marsel.is>
#
# STRUCTURE
#   The krb5.conf file is set up in the Microsoft Windows .ini format, same as the krb5.conf(5)
#
# SECTIONS
#   A krb5.conf file may contain the following sections:
#       [libdefaults]
#       [realms]
#       [domain_realm]
#       [capaths]
#       [appdefaults]
#       [plugins]
#
#   Additionally, krb5.conf may include any of the relations described in kdc.conf, which
#   is a totally insane and lazy thing to do.
#
##########################################################################
# VARIABLES FOR EACH SECTION AND THEIR VALUES
##########################################################################
#
#
#   NOTE:  In krb5.conf, later declarations override earlier ones unless the
#   section is marked with a '*' after the closing bracket. That is called a
#   final section. In the case of a final section, later declerations are
#   ignored (without any warning).
#
#   You can also do the same thing with both the sections mentioned above, e.g.
#   '[libdefaults]*' and with any subsections such as the commented out here
#   EXAMPLE.COM realm.
#
# In Fedora 41, to opt out of the system crypto-policies configuration of
# krb5, remove the symlink at /etc/krb5.conf.d/crypto-policies . This link
# will not be recreated.
#
# krb5.conf can include other files using either `include FILENAME` or `includedir DIRNAME`
# Either FILENAME or DIRNAME has to be an absolute path. If you add a directory, all files
# within that directory endinf in *.conf will be included, with the single exception of
# '.conf' itself.
includedir /etc/krb5.conf.d/
#
##########################################################################
# MODULE (AND THE INSANITY THEREOF)
##########################################################################
#
#   Last, but not least (and definitely fucking insane): you can pass arbitrary strings
#   to your own library using `module`. Those arbritrary strings are called 'residuals' in
#   Kerberos lingo. Residuals let you hand arbitrary strings (e.g. file paths or JSON
#   blobs) to your own plugin. They are declared as following:
#
#       module MODULE_PATH:RESIDUAL
#
#   For example:
#   
#       module /usr/lib64/krb5/plugins/libprofile_json.so:/etc/krb5-config.json
#
#   libprofile_json.so is not a real library. But the `residual` string would
#   will be passed to the `profile_module_initialize()` function of the module as
#
#       profile_module_initialize(const char *residual, ...) {
#           // residual == "/etc/krb5-config.json"
#       }
#
#   This is used in 'exotic' setups, where we are the fuck off our rocker and we want to use
#   json to parse the config. 
#
#   But then the whole setup here is fucking out of this world. This configuration and parser
#   is fucked up way beyond recognition or saving as software. The fact that the configuration
#   is saying 
#
#       if krb5.conf uses a module directive, kdc.conf(5) should also use one if it exists
#
#   is just incomprehensible. To me, it looks like someone half-assed the transition of
#   .ini style config into json and run out of funding at the first ten minutes.
#
##########################################################################
#
#   A sensible setup example is included at the end of the commentary, after FURTHER DISCUSSION
#
#[libdefaults]          # Settings used by the Kerberos library for *CLIENTS*
#

[libdefaults]
    dns_lookup_realm = true
    dns_lookup_kdc = true
    ticket_lifetime = 24h
    renew_lifetime = 7d
    forwardable = true
    proxiable = true
    kdc_timesync = 1
    renew_lifetime = 24h
    rdns = false
    pkinit_anchors = FILE:/etc/pki/tls/certs/ca-bundle.crt
    default_ccache_name = KEYRING:persistent:%{uid}
    spake_preauth_groups = edwards25519
    dns_canonicalize_hostname = fallback
    qualify_shortname = ""
    udp_preference_limit = 0
	default_realm = MARSEL.IS
    permitted_enctypes = aes256-cts-hmac-sha1-96 aes128-cts-hmac-sha1-96
    #default_realm = EXAMPLE.COM
    default_realm = MARSEL.IS
    #default_realm = TEST.REALM
    default_ccache_name = KEYRING:persistent:%{uid}

#[realms]
# EXAMPLE.COM = {
#     kdc = kerberos.example.com
#     admin_server = kerberos.example.com
# }*

[domain_realm]
# .example.com = EXAMPLE.COM
# example.com = EXAMPLE.COM
# default krb5.conf for marsel.is

# Yaaaay, more brilliance! The SAME SECTION IS BOTH IN KDC.CONF AND KRB5.CONF
# WHY? CUZ KRB5.CONF IS READ BY CLIENTS AND KDC.CONF BY THE SERVER.
# FUCK ME AND THE DONKEY I RODE IN ON.
[realms]
    MARSEL.IS = {
    kdc = kdc.marsel.is:88
    admin_server = kdc.marsel.is:749
    default_domain = marsel.is
}

[domain_realm]
    marsel.is = MARSEL.IS
    .marsel.is = MARSEL.IS

# Behold the brilliance of MIT Code: logging can exist also in krb5.conf!
# Why? Cuz it is interpreted by individual binaries and not not centrally
# validated. Each tool reads it if needed, ignores it otherwise.
# Fuck me with a blowtorch.
[logging]
    default         = STDERR
    kdc             = STDERR
    admin_server    = STDERR

[appdefaults]
    pam = {
        debug = true
        ticket_lifetime = 36000
        renew_lifetime = 36000
        forwardable = true
    }

