#[realms]           # Per-realm-specific database configuration and settings
#    The [realms] section in krb5.conf defines how the client locates and communicates with individual Kerberos realms. 
#    Each realm is specified as a subsection, typically named in uppercase (EXAMPLE.COM) and contains directives
