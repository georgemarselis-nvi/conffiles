#                                                       #   when running kadmin or password changes via kpasswd.
#                                                       #   There is no real default. If `admin_server` is not set, the Kerberos library will look up if 
#                                                       #   DNS SRV _kerberos-adm._udp.REALM is defined. Then if that is undefined as well, the tool will fail.
#                                                       #   Multiple declarations add more KDC servers (cuz some knucklehead could not make a whitespace/comma)-separated list
#                                                       #
